name: Vercel Deploy

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/vercel.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/vercel.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Site
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    defaults:
      run:
        working-directory: site

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_ENVIRONMENT: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || 'preview' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Vercel configuration
        id: vercel-config
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::warning title=Vercel deployment skipped::Set VERCEL_TOKEN secret plus VERCEL_ORG_ID and VERCEL_PROJECT_ID variables to enable deployments."
          {
            echo "### Vercel deployment skipped"
            echo ""
            echo "Set these repository values to enable this job:"
            echo ""
            echo "- Secret: VERCEL_TOKEN"
            echo "- Variable: VERCEL_ORG_ID"
            echo "- Variable: VERCEL_PROJECT_ID"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up pnpm
        if: steps.vercel-config.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Set up Node.js
        if: steps.vercel-config.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.vercel-config.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        if: steps.vercel-config.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.vercel-config.outputs.configured == 'true'
        run: vercel pull --yes --environment="$VERCEL_ENVIRONMENT" --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        if: steps.vercel-config.outputs.configured == 'true'
        run: |
          if [ "$VERCEL_ENVIRONMENT" = "production" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy prebuilt output
        if: steps.vercel-config.outputs.configured == 'true'
        id: deploy
        run: |
          if [ "$VERCEL_ENVIRONMENT" = "production" ]; then
            DEPLOYMENT_URL="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          else
            DEPLOYMENT_URL="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          fi

          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          {
            echo "### Vercel deployment"
            echo ""
            echo "- Environment: $VERCEL_ENVIRONMENT"
            echo "- URL: $DEPLOYMENT_URL"
          } >> "$GITHUB_STEP_SUMMARY"
