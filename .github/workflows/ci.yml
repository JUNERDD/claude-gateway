name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  site:
    name: Site Lint and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: site

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Verify SEO (built site)
        env:
          PORT: 4179
        run: |
          pnpm start &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          ready=""
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null "http://127.0.0.1:${PORT}/"; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ -z "$ready" ]; then
            echo "Next.js did not become ready on port ${PORT}"
            exit 1
          fi
          node scripts/verify-seo.mjs --base "http://127.0.0.1:${PORT}"
