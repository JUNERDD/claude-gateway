name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Test, Package, and Publish DMG
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          echo "=== Xcode ==="
          xcodebuild -version
          echo "=== Swift ==="
          swift --version
          echo "=== SDK ==="
          xcrun --show-sdk-version
          echo "=== Architecture ==="
          uname -m

      - name: Test
        run: swift test

      - name: Verify release tag matches Info.plist
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)
          test "${GITHUB_REF_NAME}" = "v${VERSION}"

      - name: Clean build cache
        run: rm -rf .build

      - name: Package DMG
        run: ./scripts/package_dmg.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)
          TAG="${GITHUB_REF_NAME}"
          DMG="dist/ClaudeGateway-${VERSION}.dmg"
          LATEST_DMG="dist/ClaudeGateway-latest.dmg"
          TITLE="Claude Gateway ${VERSION}"
          NOTES="Automated release for ${TAG}."

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${DMG}" "${LATEST_DMG}" --clobber
          else
            gh release create "${TAG}" "${DMG}" "${LATEST_DMG}" --title "${TITLE}" --notes "${NOTES}"
          fi
