name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Test, Package, and Publish DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test
        run: swift test

      - name: Verify release tag matches Info.plist
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)
          test "${GITHUB_REF_NAME}" = "v${VERSION}"

      - name: Package DMG
        run: ./scripts/package_dmg.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)
          TAG="${GITHUB_REF_NAME}"
          DMG="dist/ClaudeDeepSeekGateway-${VERSION}.dmg"
          LATEST_DMG="dist/ClaudeDeepSeekGateway-latest.dmg"
          TITLE="Claude DeepSeek Gateway ${VERSION}"
          NOTES="Automated release for ${TAG}."

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${DMG}" "${LATEST_DMG}" --clobber
          else
            gh release create "${TAG}" "${DMG}" "${LATEST_DMG}" --title "${TITLE}" --notes "${NOTES}"
          fi
